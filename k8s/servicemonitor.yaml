apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: java-app-monitor
  namespace: java-app-demo
  labels:
    release: prometheus
    app: java-app
spec:
  selector:
    matchLabels:
      app: java-app
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
