apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: billing-pipeline
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/dawidbera/billing-pipeline.git'
    targetRevision: HEAD
    path: k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: java-app-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
