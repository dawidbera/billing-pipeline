name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.docs/**'
      - 'README.md'
      - 'argocd/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '.docs/**'
      - 'README.md'
      - 'argocd/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build java-app with Maven
        run: mvn -f java-app/pom.xml clean package -DskipTests

      - name: Build file-processor-service with Maven
        run: mvn -f file-processor-service/pom.xml clean package -DskipTests

      - name: Lowercase repo owner and name for Docker
        run: |
          echo "REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push java-app Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/java-app:latest
            ghcr.io/${{ env.REPO_LOWER }}/java-app:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push file-processor-service Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./file-processor-service
          file: ./file-processor-service/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ env.REPO_LOWER }}/file-processor:latest
            ghcr.io/${{ env.REPO_LOWER }}/file-processor:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Kubernetes manifests with new image tags
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          # Update java-app deployment image
          sed -i "s|image: java-app:latest|image: ghcr.io/${{ env.REPO_LOWER }}/java-app:${{ github.sha }}|g" k8s/app.yaml
          sed -i "s|imagePullPolicy: IfNotPresent|imagePullPolicy: Always|g" k8s/app.yaml
          
          # Update file-processor deployment image
          sed -i "s|image: file-processor:latest|image: ghcr.io/${{ env.REPO_LOWER }}/file-processor:${{ github.sha }}|g" file-processor-service/k8s/deployment.yaml
          sed -i "s|imagePullPolicy: Never|imagePullPolicy: Always|g" file-processor-service/k8s/deployment.yaml

      - name: Commit and push changes
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/app.yaml file-processor-service/k8s/deployment.yaml
          git diff-index --quiet HEAD || git commit -m "chore: update image tags for ${{ github.sha }} [skip ci]"
          git push
